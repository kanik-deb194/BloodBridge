<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - BloodBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="responsive.css" />
    <style>
      .forgot-container {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 20px;
        padding-top: 60px;
        padding-bottom: 60px;
      }
      .back-link {
        text-align: center;
        margin-top: 20px;
      }
      .back-link a {
        color: #ff6b81;
        text-decoration: none;
        transition: color 0.3s;
      }
      .back-link a:hover {
        color: #ff8da0;
        text-decoration: underline;
      }
      .info-text {
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.9rem;
        margin-bottom: 20px;
        text-align: center;
      }
    </style>

  </head>
  <body>
    <!-- BACKGROUND -->
    <div class="bg-scene">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="grid-overlay"></div>

    <!-- FORGOT PASSWORD CONTAINER -->
    <div class="forgot-container">
      <div class="login-card">
        <!-- LOGO -->
        <div class="logo-section">
          <img src="blood1.png" alt="BloodBridge Logo" />
          <h1>Forgot Password?</h1>
          <p class="info-text">
            Enter your email address and we'll send you a link to reset your
            password.
          </p>
        </div>

        <!-- FORM -->
        <form
          id="forgotForm"
          method="POST"
          action="forgot_password.php"
          novalidate
        >
          <div class="input-group">
            <label>Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="Enter your registered email"
              required
            />
          </div>

          <button type="submit" class="login-btn">Send Reset Link</button>

          <div class="back-link">
            <a href="login.html">← Back to Login</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      const forgotForm = document.getElementById("forgotForm");

      forgotForm.addEventListener("submit", async function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();

        if (email === "") {
          showError("Please enter your email address.");
          return;
        }

        if (!isValidEmail(email)) {
          showError("Please enter a valid email address.");
          return;
        }

        const submitBtn = document.querySelector(".login-btn");
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Sending...";

        try {
          const formData = new FormData();
          formData.append("email", email);

          const response = await fetch("forgot_password.php", {
            method: "POST",
            body: formData,
          });

          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.message || "Request failed");
          }

          showSuccess(result.message);
          document.getElementById("email").value = "";
        } catch (error) {
          showError(error.message);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });

      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      function showError(message) {
        removeMessages();
        const errorDiv = document.createElement("div");
        errorDiv.className = "login-message error";
        errorDiv.textContent = message;
        const loginCard = document.querySelector(".login-card");
        loginCard.insertBefore(errorDiv, loginCard.querySelector("form"));
        setTimeout(() => errorDiv.remove(), 5000);
      }

      function showSuccess(message) {
        removeMessages();
        const successDiv = document.createElement("div");
        successDiv.className = "login-message success";
        successDiv.textContent = message;
        const loginCard = document.querySelector(".login-card");
        loginCard.insertBefore(successDiv, loginCard.querySelector("form"));
      }

      function removeMessages() {
        document
          .querySelectorAll(".login-message")
          .forEach((msg) => msg.remove());
      }
    </script>
  </body>
</html>
